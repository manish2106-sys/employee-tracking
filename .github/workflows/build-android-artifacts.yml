name: Build Android Artifacts

on:
  push:
    branches: ["main"]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-artifacts.yml"
  workflow_dispatch:

jobs:
  debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  unsigned-release-apk:
    name: Build Unsigned Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK (Unsigned)
        run: gradle :app:assembleRelease

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-release-unsigned-apk
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

  signed-release-aab:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check signing secrets
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Java 17
        if: steps.signing.outputs.available == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        if: steps.signing.outputs.available == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        if: steps.signing.outputs.available == 'true'
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        if: steps.signing.outputs.available == 'true'
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"

      - name: Build Signed Release AAB
        if: steps.signing.outputs.available == 'true'
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:bundleRelease

      - name: Upload Signed Release AAB
        if: steps.signing.outputs.available == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-release-aab
          path: android-app/app/build/outputs/bundle/release/app-release.aab

      - name: Skip signed AAB (missing secrets)
        if: steps.signing.outputs.available != 'true'
        run: echo "Signing secrets are not configured; skipping signed AAB build."
