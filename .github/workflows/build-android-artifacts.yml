name: Build Android Artifacts

on:
  push:
    branches: ["main"]
    paths:
      - "android-app/**"
      - ".github/workflows/build-android-artifacts.yml"
  workflow_dispatch:

jobs:
  debug-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Debug APK
        run: gradle :app:assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk

  unsigned-release-apk:
    name: Build Unsigned Release APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Release APK (Unsigned)
        run: gradle :app:assembleRelease

      - name: Upload Unsigned Release APK
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-release-unsigned-apk
          path: android-app/app/build/outputs/apk/release/app-release-unsigned.apk

  signed-release-aab:
    name: Build Signed Release AAB
    runs-on: ubuntu-latest
    if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}
    defaults:
      run:
        working-directory: android-app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release-keystore.jks

      - name: Build Signed Release AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/release-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:bundleRelease

      - name: Upload Signed Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: employee-tracker-release-aab
          path: android-app/app/build/outputs/bundle/release/app-release.aab
